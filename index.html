<!DOCTYPE html><html lang=en><meta charset=UTF-8><meta name=viewport content="width=device-width, initial-scale=1.0"><title>Bloom filter code executor</title><link rel=stylesheet href=/bloom_filter_algorithm_visualizer/bloom_filter_algorithm_visualizer.ff9f220e.css><body>
    <h1 class=main-title>Bloom filter code executor</h1>
    <div id=app class=app-container>
        <div id=bf-param-holder class=param-holder>
            <div id=item-input-holder class=item-info-holder>
                <div class="input-separator item-input-holder">
                    <label for=bf-bit-size-input class=info-label>Number of bits in the filter (max 500):</label>
                    <input type=number id=bf-bit-size-input class="input-field item-input-holder" min=1 value=30 max=500>
                </div>
                <div class="input-separator item-input-holder">
                    <label for=bf-dummy-count-input class=info-label>Dummy
                        words (max 10):</label>
                    <input type=number id=bf-dummy-count-input class="input-field item-input-holder" min=0 value=0 max=10>
                </div>

                <button id=bf-bit-size-submit class="item-input-holder submit-button">
                    Set
                </button>
            </div>

            <div id=bf-item-info-holder class=item-info-holder>
                <div class="info-label info-size">
                    <strong>Filter size:</strong>
                    <span id=bf-info-size>-</span>
                </div>
                <div class="info-hash-count info-label">
                    <strong>Hash functions:</strong>
                    <span id=bf-info-hash-count>-</span>
                </div>
                <div class="info-elements info-label">
                    <strong>Elements:</strong>
                    <span id=bf-info-elements>-</span>
                </div>
                <div class="info-fpr info-label">
                    <strong>False positive rate:</strong>
                    <span id=bf-info-fpr>-</span>
                </div>
            </div>
            <div id=bf-item-input-holder class=item-info-holder>
                <div class="input-separator item-input-holder">
                    <input id=add-item-input class="input-field item-input-holder" min=1 value placeholder="Enter item to add" maxlength=16>
                    <button id=add-item-submit class="item-input-holder submit-button">
                        Add
                    </button>
                </div>
                <div class="input-separator item-input-holder">
                    <input id=check-item-input class="input-field item-input-holder" min=0 value placeholder="Enter item to check" maxlength=16>
                    <button id=check-item-submit class="item-input-holder submit-button">
                        Check
                    </button>
                    <div class=checkbox-holder>
                        <label for=fast-forward-checkbox class=checkbox-label>Disable step-by-step
                            execution:</label>
                        <input type=checkbox id=fast-forward-checkbox class=checkbox>
                    </div>
                </div>
            </div>
        </div>
        <div id=prompt-holder class=param-holder>
            <div class=prompt-window>
                <div id=prompt-simulator class=prompt-simulator>
                </div>
                <button id=next-step-button class=next-step-button>
                    Next Step
                </button>
                <button id=finish-journey-button class=next-step-button>
                    Finish Execution
                </button>
            </div>
        </div>
        <div id=bf-container class=param-holder>
            <svg id=bloom-filter-svg class=svg />
        </div>
        <button id=scroll-button class=scroll-button>▲</button>
    </div>
    <script src=/bloom_filter_algorithm_visualizer/bloom_filter_algorithm_visualizer.1c0be34a.js type=module></script>
